
<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tööaja tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --border: #e0dbd2;
    --text: #1a1814;
    --muted: #7a7570;
    --accent: #2d5a3d;
    --accent-light: #e8f2ec;
    --danger: #8b2020;
    --danger-light: #f9eded;
    --warn: #7a5a10;
    --warn-light: #fdf6e3;
    --pause: #3a5a8a;
    --pause-light: #e8eef8;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 520px; margin: 0 auto; }
  header { margin-bottom: 2.5rem; text-align: center; }
  header h1 { font-size: 2rem; font-weight: 600; letter-spacing: -0.03em; }
  header p { font-size: 0.875rem; color: var(--muted); margin-top: 0.35rem; font-family: var(--mono); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
  .card-title { font-size: 0.7rem; font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
  #setup-screen { display: block; } #main-screen { display: none; }
  .name-label { font-size: 0.875rem; color: var(--muted); margin-bottom: 0.5rem; display: block; font-family: var(--mono); }
  input[type="text"] { width: 100%; padding: 0.75rem 1rem; font-size: 1.1rem; font-family: var(--sans); border: 1.5px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  input[type="text"]:focus { border-color: var(--accent); }
  button { font-family: var(--sans); font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; border-radius: 10px; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; padding: 0.75rem 1.5rem; width: 100%; margin-top: 1rem; font-size: 1rem; }
  .btn-primary:hover { background: #234a32; }
  .btn-secondary { background: transparent; color: var(--muted); padding: 0.4rem 0.8rem; border: 1px solid var(--border); font-size: 0.8rem; }
  .btn-secondary:hover { background: var(--bg); color: var(--text); }
  .greeting { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
  .date-line { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); }

  .time-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
  .time-box { background: var(--bg); border-radius: 12px; padding: 0.85rem; text-align: center; border: 1px solid var(--border); }
  .time-box.pause-box { border-color: #c5d4e8; background: var(--pause-light); }
  .time-box-label { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.4rem; }
  .time-box-value { font-family: var(--mono); font-size: 1.3rem; font-weight: 500; color: var(--text); }

  .action-btn { width: 100%; padding: 0.9rem; font-size: 0.95rem; margin-bottom: 0.6rem; background: var(--accent); color: #fff; border-radius: 12px; font-weight: 500; }
  .action-btn:hover { background: #234a32; }
  .action-btn:active { transform: scale(0.99); }
  .action-btn.checkout { background: var(--text); }
  .action-btn.checkout:hover { background: #333; }
  .action-btn.pause-start { background: var(--pause); }
  .action-btn.pause-start:hover { background: #2d4a74; }
  .action-btn.pause-end { background: var(--pause); }
  .action-btn.pause-end:hover { background: #2d4a74; }
  .action-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  .btn-row { display: flex; gap: 0.6rem; }
  .btn-row .action-btn { margin-bottom: 0; }

  .progress-wrap { margin: 1rem 0; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .progress-label { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); }
  .progress-pct { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.5s ease; }
  .progress-fill.over { background: #1a7a3a; }

  .status-badge { display: inline-flex; align-items: center; gap: 0.4rem; font-family: var(--mono); font-size: 0.75rem; padding: 0.3rem 0.75rem; border-radius: 999px; margin-top: 0.5rem; }
  .badge-ok { background: var(--accent-light); color: var(--accent); }
  .badge-warn { background: var(--warn-light); color: var(--warn); }
  .badge-danger { background: var(--danger-light); color: var(--danger); }
  .badge-neutral { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .badge-pause { background: var(--pause-light); color: var(--pause); }

  .pause-info { font-family: var(--mono); font-size: 0.78rem; color: var(--pause); background: var(--pause-light); border-radius: 8px; padding: 0.5rem 0.75rem; margin-bottom: 0.75rem; text-align: center; }

  .history-item { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--border); font-size: 0.875rem; flex-wrap: wrap; gap: 4px; }
  .history-item:last-child { border-bottom: none; }
  .history-date { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); }
  .history-times { font-family: var(--mono); font-size: 0.78rem; color: var(--text); }
  .history-hours { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; }
  .hours-ok { color: var(--accent); } .hours-bad { color: var(--danger); }
  .empty-history { text-align: center; color: var(--muted); font-family: var(--mono); font-size: 0.8rem; padding: 1.5rem 0; }
  .switch-user { text-align: center; margin-top: 1.5rem; }
  .live-clock { font-family: var(--mono); font-size: 1.4rem; font-weight: 500; letter-spacing: -0.02em; color: var(--text); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Tööaja tracker</h1>
    <p id="header-date"></p>
  </header>

  <div id="setup-screen">
    <div class="card">
      <div class="card-title">Kes sa oled?</div>
      <label class="name-label" for="name-input">Sinu nimi</label>
      <input type="text" id="name-input" placeholder="nt. Mari Tamm" autocomplete="name" />
      <button class="btn-primary" onclick="startSession()">Alusta ↗</button>
    </div>
  </div>

  <div id="main-screen">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <div class="greeting" id="greeting">Tere!</div>
          <div class="date-line" id="main-date"></div>
          <div style="font-family:var(--mono);font-size:0.75rem;color:var(--accent);margin-top:4px;">Tööpäev: 8h</div>
        </div>
        <div class="live-clock" id="live-clock"></div>
      </div>
      <hr class="divider">

      <div class="time-row">
        <div class="time-box">
          <div class="time-box-label">Saabumine</div>
          <div class="time-box-value" id="checkin-display">—</div>
        </div>
        <div class="time-box pause-box">
          <div class="time-box-label">Paus kokku</div>
          <div class="time-box-value" id="pause-display">—</div>
        </div>
        <div class="time-box">
          <div class="time-box-label">Lahkumine</div>
          <div class="time-box-value" id="checkout-display">—</div>
        </div>
      </div>

      <div id="pause-info" style="display:none;" class="pause-info"></div>

      <div class="progress-wrap" id="progress-section" style="display:none;">
        <div class="progress-header">
          <span class="progress-label">Tööpäeva progress (ilma pausita)</span>
          <span class="progress-pct" id="progress-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div id="status-badge-wrap" style="margin-top:0.75rem;"></div>
      </div>

      <div id="action-area"></div>
    </div>

    <div class="card" id="tip-card" style="border-left: 3px solid var(--accent); background: linear-gradient(135deg, #f9fdf9 0%, var(--surface) 100%);">
      <div class="card-title">💡 Päeva teadmine</div>
      <div id="tip-text" style="font-size:0.9rem; line-height:1.6; color:var(--text); margin-bottom:0.5rem;"></div>
      <div id="tip-source" style="font-family:var(--mono); font-size:0.7rem; color:var(--muted);"></div>
    </div>

    <div class="card">
      <div class="card-title">Ajalugu</div>
      <div id="history-list"></div>
    </div>

    <div class="switch-user">
      <button class="btn-secondary" onclick="switchUser()">↩ Vaheta kasutajat</button>
    </div>
  </div>
</div>

<script>
const WORK_MINS = 8 * 60;
const STORAGE_KEY = 'tooaeg_v2';

function pad(n) { return String(n).padStart(2,'0'); }
function nowHHMM() { const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function todayKey() { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function minsToStr(m) {
  const abs=Math.abs(m), h=Math.floor(abs/60), min=abs%60;
  return (m<0?'-':'')+h+'h'+(min>0?' '+pad(min)+'m':'');
}
function timeToMins(t) { if(!t) return 0; const [h,m]=t.split(':').map(Number); return h*60+m; }

function getData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; } catch(e) { return {}; } }
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function getUserData(name) { const d=getData(); return d[name]||{}; }
function setUserDay(name, key, obj) { const d=getData(); if(!d[name]) d[name]={}; d[name][key]=obj; saveData(d); }

let currentUser = null;

// Calculate total pause minutes for a day record
function totalPauseMins(rec) {
  if(!rec.pauses) return 0;
  return rec.pauses.reduce((sum, p) => {
    if(!p.start) return sum;
    const end = p.end || nowHHMM();
    return sum + Math.max(0, timeToMins(end) - timeToMins(p.start));
  }, 0);
}

// Net worked minutes (excluding pauses)
function netWorkedMins(rec) {
  if(!rec.checkin) return 0;
  const end = rec.checkout || nowHHMM();
  const gross = Math.max(0, timeToMins(end) - timeToMins(rec.checkin));
  return Math.max(0, gross - totalPauseMins(rec));
}

function isPaused(rec) {
  if(!rec.pauses || !rec.pauses.length) return false;
  const last = rec.pauses[rec.pauses.length-1];
  return last.start && !last.end;
}

function startSession() {
  const name = document.getElementById('name-input').value.trim();
  if(!name) { document.getElementById('name-input').focus(); return; }
  currentUser = name;
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  renderMain();
  setInterval(tick, 15000);
}

function switchUser() {
  currentUser=null;
  document.getElementById('setup-screen').style.display='block';
  document.getElementById('main-screen').style.display='none';
  document.getElementById('name-input').value='';
}

function getToday() {
  return getUserData(currentUser)[todayKey()] || { checkin:null, checkout:null, pauses:[] };
}
function setToday(obj) { setUserDay(currentUser, todayKey(), obj); }

function handleCheckin() {
  const rec = getToday();
  setToday({ ...rec, checkin: nowHHMM(), pauses: [] });
  renderMain();
}

function handleCheckout() {
  const rec = getToday();
  // End any open pause first
  let pauses = rec.pauses || [];
  if(isPaused(rec)) {
    pauses = pauses.map((p,i) => i===pauses.length-1 && !p.end ? {...p, end: nowHHMM()} : p);
  }
  setToday({ ...rec, pauses, checkout: nowHHMM() });
  renderMain();
}

function handlePauseStart() {
  const rec = getToday();
  const pauses = [...(rec.pauses||[]), { start: nowHHMM(), end: null }];
  setToday({ ...rec, pauses });
  renderMain();
}

function handlePauseEnd() {
  const rec = getToday();
  const pauses = (rec.pauses||[]).map((p,i) =>
    i===(rec.pauses.length-1) && !p.end ? {...p, end: nowHHMM()} : p
  );
  setToday({ ...rec, pauses });
  renderMain();
}

function renderMain() {
  const rec = getToday();
  const d = new Date();
  const days=['pühapäev','esmaspäev','teisipäev','kolmapäev','neljapäev','reede','laupäev'];
  const months=['jaanuar','veebruar','märts','aprill','mai','juuni','juuli','august','september','oktoober','november','detsember'];

  document.getElementById('greeting').textContent = 'Tere, '+currentUser.split(' ')[0]+'!';
  document.getElementById('main-date').textContent = days[d.getDay()]+', '+d.getDate()+'. '+months[d.getMonth()]+' '+d.getFullYear();
  document.getElementById('checkin-display').textContent = rec.checkin||'—';
  document.getElementById('checkout-display').textContent = rec.checkout||'—';

  const pm = totalPauseMins(rec);
  document.getElementById('pause-display').textContent = pm > 0 ? minsToStr(pm) : '—';

  const paused = isPaused(rec);
  const pauseInfo = document.getElementById('pause-info');
  if(paused) {
    const lastPause = rec.pauses[rec.pauses.length-1];
    const curPauseMins = Math.max(0, timeToMins(nowHHMM()) - timeToMins(lastPause.start));
    pauseInfo.style.display='block';
    pauseInfo.textContent = '⏸ Paus algas kell '+lastPause.start+' — kestus '+minsToStr(curPauseMins);
  } else {
    pauseInfo.style.display='none';
  }

  const nwm = netWorkedMins(rec);
  const pct = Math.min(100, Math.round(nwm/WORK_MINS*100));
  const area = document.getElementById('action-area');

  if(!rec.checkin) {
    area.innerHTML = `<button class="action-btn" onclick="handleCheckin()">Registreeri saabumine</button>`;
    document.getElementById('progress-section').style.display='none';
  } else if(rec.checkout) {
    area.innerHTML = `<button class="action-btn" disabled>Päev lõpetatud ✓</button>`;
    document.getElementById('progress-section').style.display='block';
    updateProgress(nwm, pct, pm, true);
  } else if(paused) {
    area.innerHTML = `
      <button class="action-btn pause-end" onclick="handlePauseEnd()">▶ Jätka tööd</button>
      <button class="action-btn checkout" onclick="handleCheckout()" style="margin-top:0;">Registreeri lahkumine</button>`;
    document.getElementById('progress-section').style.display='block';
    updateProgress(nwm, pct, pm, false);
  } else {
    area.innerHTML = `
      <div class="btn-row">
        <button class="action-btn pause-start" onclick="handlePauseStart()">⏸ Alusta pausi</button>
        <button class="action-btn checkout" onclick="handleCheckout()">Registreeri lahkumine</button>
      </div>`;
    document.getElementById('progress-section').style.display='block';
    updateProgress(nwm, pct, pm, false);
  }

  renderHistory();
}

function updateProgress(nwm, pct, pm, done) {
  document.getElementById('progress-pct').textContent = pct+'%';
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct+'%';
  fill.className = 'progress-fill'+(pct>=100?' over':'');

  const badge = document.getElementById('status-badge-wrap');
  const diff = nwm - WORK_MINS;
  let cls, txt;

  if(isPaused(getToday()) && !done) {
    cls='badge-pause'; txt='⏸ Pausil — '+minsToStr(nwm)+' tehtud';
  } else if(!done) {
    if(diff>=0) { cls='badge-ok'; txt='✓ Norm täidetud'; }
    else if(nwm>=WORK_MINS*0.75) { cls='badge-warn'; txt='Jääb '+minsToStr(-diff); }
    else { cls='badge-neutral'; txt=minsToStr(nwm)+' tehtud'; }
  } else {
    if(diff>=0) { cls='badge-ok'; txt='✓ '+minsToStr(nwm)+' (paus: '+minsToStr(pm)+')'; }
    else { cls='badge-danger'; txt='⚠ Puudub '+minsToStr(-diff)+(pm>0?' · paus: '+minsToStr(pm):''); }
  }
  badge.innerHTML = `<span class="status-badge ${cls}">${txt}</span>`;
}

function renderHistory() {
  const ud = getUserData(currentUser);
  const today = todayKey();
  const entries = Object.entries(ud).filter(([k])=>k!==today).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,10);
  const list = document.getElementById('history-list');
  if(!entries.length) { list.innerHTML='<div class="empty-history">Ajalugu puudub</div>'; return; }
  list.innerHTML = entries.map(([dateKey, rec]) => {
    const nwm = rec.checkin && rec.checkout ? netWorkedMins(rec) : null;
    const pm = totalPauseMins(rec);
    const [y,m,dd] = dateKey.split('-');
    const dobj = new Date(+y,+m-1,+dd);
    const dayNames=['P','E','T','K','N','R','L'];
    const dateStr = dayNames[dobj.getDay()]+' '+dd+'.'+m;
    const timesStr = rec.checkin ? rec.checkin+(rec.checkout?' – '+rec.checkout:' – ?') : '—';
    const pauseStr = pm>0 ? ` (paus ${minsToStr(pm)})` : '';
    const hoursHtml = nwm!==null
      ? `<span class="history-hours ${nwm>=WORK_MINS?'hours-ok':'hours-bad'}">${minsToStr(nwm)}${pauseStr}</span>`
      : `<span class="history-hours" style="color:var(--muted)">—</span>`;
    return `<div class="history-item"><span class="history-date">${dateStr}</span><span class="history-times">${timesStr}</span>${hoursHtml}</div>`;
  }).join('');
}

function tick() {
  const d=new Date();
  const cl=document.getElementById('live-clock');
  if(cl) cl.textContent=pad(d.getHours())+':'+pad(d.getMinutes());
  if(currentUser) renderMain();
}

const TIPS = [
  { text: "Uuringud näitavad, et inimesed on kõige produktiivsemad esimese 2–4 tunni jooksul pärast tööle saabumist. Alusta raskematest ülesannetest!", source: "Allikas: Peak performance research, Anders Ericsson" },
  { text: "52 minutit tööd + 17 minutit pausi — see on uuringute järgi ideaalne rütm maksimaalse keskendumisvõime säilitamiseks.", source: "Allikas: DeskTime produktiivsuse uuring (2014)" },
  { text: "Mitmest ülesandest korraga tegelemise asemel ühe asja lõpetamine tõstab efektiivsust keskmiselt 25%.", source: "Allikas: American Psychological Association" },
  { text: "Loomuliku valguse käes töötamine parandab und keskmiselt 46 minutit ööpäevas ja tõstab päevast energiataset.", source: "Allikas: Northwestern University (2014)" },
  { text: "Töötajad, kes teevad lühikese jalutuskäigu lõunapausi ajal, on 15% vähem läbipõlenud kuu lõpuks.", source: "Allikas: Stanford University liikumisuuring" },
  { text: "Taustamuusika (eriti instrumentaal) võib tõsta lihtsate ülesannete kiirust kuni 15%, kuid häirib keerukamat analüütilist mõtlemist.", source: "Allikas: Journal of Consumer Research" },
  { text: "Selge päevakava kirjapanek hommikul vähendab otsustusväsimust ja aitab säilitada tahtejõudu kogu tööpäeva vältel.", source: "Allikas: Roy Baumeister, willpower research" },
  { text: "Treenides vähemalt 3 korda nädalas tõuseb kognitiivne jõudlus kuni 20% ja väheneb tööstress märkimisväärselt.", source: "Allikas: Journal of Occupational Health Psychology" },
  { text: "Töötajad, kes ütlevad päeva lõpus endale 'sain täna tehtud' (lõpetamistunne), põlevad läbi 28% harvemini.", source: "Allikas: Harvard Business Review töörahulolu uuring" },
  { text: "Hüdreeritud aju töötab efektiivsemalt — juba 1–2% vedelikupuudus võib vähendada keskendumisvõimet märgatavalt.", source: "Allikas: Journal of Nutrition (2012)" },
];

function showDailyTip() {
  const d = new Date();
  const idx = (d.getDate() + d.getMonth()) % TIPS.length;
  const tip = TIPS[idx];
  document.getElementById('tip-text').textContent = tip.text;
  document.getElementById('tip-source').textContent = tip.source;
}
showDailyTip();

const hd=new Date();
document.getElementById('header-date').textContent=hd.toLocaleDateString('et-EE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
tick();
setInterval(()=>{ const cl=document.getElementById('live-clock'); if(cl){const d=new Date();cl.textContent=pad(d.getHours())+':'+pad(d.getMinutes());}},15000);
</script>
</body>
</html>
